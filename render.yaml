services:
  - type: web
    name: lifeos-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: SPREADSHEET_ID
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: GOOGLE_CREDS_JSON
        sync: false
      - key: WEBHOOK_URL
        sync: false
